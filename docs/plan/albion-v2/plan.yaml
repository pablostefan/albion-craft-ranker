  - id: task-04
    title: "Feature: Create src/item_names.py with format_item_id() parser"
    description: |
      Create a new standalone module src/item_names.py containing a single pure function.

      format_item_id(item_id: str) -> str
      Parser rules (applied in order):
        1. Check for @N enchantment suffix: match r"@(\d+)$"; extract N, remove from string.
        2. Check for tier prefix: match r"^T(\d)_"; extract tier digit, remove prefix.
        3. Expand known keyword tokens (split remaining string by "_"):
             SWORD→Sword, BOW→Bow, ARMOR→Armor, LEATHER→Leather, PLATE→Plate,
             CLOTH→Cloth, HEAD→Head, SHOES→Shoes, CAPE→Cape, BAG→Bag,
             OFF→Off, SHIELD→Shield, SET→(silent — indicates variant, shown as .N),
             MORGANA→Morgana, KEEPER→Keeper, HERETIC→Heretic, etc.
           Numeric-only tokens from SET{N} patterns become ".{N}" variant suffix.
        4. Assemble result: "{expanded_name} T{tier}" + optional " +{N}" enchant suffix.
           SET variant becomes ".{N}" appended to tier instead: "T{tier}.{N}" or at end.
        5. Fallback: if no tier found, return title-cased expansion of tokens.
           If no expansion found at all, return raw item_id unchanged.

      Example outputs:
        T4_SWORD@1         → "Sword T4 +1"
        T6_ARMOR_LEATHER_SET3 → "Leather Armor T6 .3"
        T5_BOW             → "Bow T5"
        UNKNOWN_ITEM       → "UNKNOWN_ITEM"

      The function must have NO imports from other project modules (pure utility).

