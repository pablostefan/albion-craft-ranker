      likelihood: medium
      impact: high
      mitigation: >
        Audit all occurrences of state.get_recipe() in the codebase before changing
        the signature. Update all call sites atomically in task-02. Run full pytest
        suite immediately after.
    - scenario: >
        ScoringConfig.__post_init__ already validates that profit+focus+volume+freshness
