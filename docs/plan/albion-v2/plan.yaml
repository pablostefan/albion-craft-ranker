created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 13
  risk_score: low

tldr: |
  10-task plan in 3 waves.

  Wave 1 (4 parallel tasks): Fixes all 3 confirmed bugs — volume_score uses buy_price_max
  as proxy instead of real daily volume; recipe_index loses enchantment variants due to
  key collision; CORS origin is hardcoded. Also creates the standalone item name parser
  module (src/item_names.py). Tasks can run fully in parallel except task-01 and task-02
  which both touch items.py (serial via conflicts_with).

  Wave 2 (3 serial tasks, shared file deps): Wires display_name into the full schema
  stack (models → schemas → TS types); adds the ?q= search-by-name filter to GET /items;
  threads the quality parameter from ScoringConfig through the refresh background task,
  POST /refresh body, and GET /items route. Serial due to shared models.py and items.py.

  Wave 3 (2 frontend tasks + 1 test task, partially parallel): Adds debounced search input
  to FilterSidebar; finishes quality selector UI (constant already defined, just needs
  wiring); adds ~15 new test cases covering all changed behavior. Frontend tasks are serial
  (same files); test task is independent and can run in parallel with frontend work.

open_questions:
  - "format_item_id: should items with no T{n} prefix (e.g. JOURNAL_NOVICE) return raw id or a cleaned fallback?"
  - "quality param in ScoringConfig: is quality a persistent global setting (PUT /config) or per-request-only override?"
  - "Does background _refresh_prices need quality=config.quality or should it always use quality=1 for broadest price coverage?"

