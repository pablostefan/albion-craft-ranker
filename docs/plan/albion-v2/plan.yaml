plan_id: albion-v2
objective: >
  Fix 3 confirmed bugs (volume_score proxy, recipe_index key collision, CORS hardcoding)
  and add 3 features (item name parser + display_name field, search-by-name endpoint + UI,
  quality param backend + frontend) across the albion-craft-ranker Python/FastAPI backend
  and Next.js/TypeScript frontend.
