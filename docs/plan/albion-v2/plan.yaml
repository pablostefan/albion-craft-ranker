    title: "Bug 1: Fix volume_score — pass real daily volumes into rank_items_v2"
    description: |
      In src/scoring.py, rank_items_v2 step 3 assigns:
        volume = max(mp_sell.buy_price_max, 0.0)
      This uses buy-order pressure as a volume proxy. Real daily volume is fetched via
      _fetch_volumes() in list_items() but is never passed into the scoring function.

      Changes:
      1. src/scoring.py — add keyword parameter to rank_items_v2:
           volumes_map: dict[str, float] | None = None
         In the per-recipe loop, replace the volume assignment with:
           volume = (volumes_map or {}).get(recipe.product_id) or max(mp_sell.buy_price_max, 0.0)
         This gracefully falls back to buy_price_max when the map is absent or missing a key.

      2. src/api/routes/items.py — in list_items(), the _fetch_volumes() helper already
         fetches real volumes when sort_by is "daily_volume" or "final_score". For those
         paths, pass the pre-fetched volumes dict to rank_items_v2 via volumes_map= so
         scoring reflects real volume. For all other sort_by values, volumes_map=None
         preserves existing behavior.

