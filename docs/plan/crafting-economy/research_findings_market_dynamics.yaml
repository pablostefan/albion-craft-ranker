plan_id: crafting-economy
objective: "Research Albion Online market dynamics, fee structures, and selling strategies"
focus_area: market_dynamics
created_at: "2025-07-13T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - Marketplace fees: 2.5% listing/setup fee (non-refundable) + 8% sales tax (4% for Premium). Total effective tax: 10.5% normal, 6.5% Premium.
  - Black Market in Caerleon: NPCs post buy orders driven by mob kills. Prices rise with unfilled demand. Primary item sink for the economy.
  - Each city has its own local marketplace - no global auction house. Arbitrage between cities is a valid strategy.
  - Sell order listings expire after 30 days. Buy orders also expire.
  - Current codebase uses fixed 6.5% tax_rate, not distinguishing Premium status or the separate 2.5% setup fee.

research_metadata:
  methodology: "fetch_webpage for Wiki Marketplace and Black Market pages, codebase analysis via read_file"
  scope: "Marketplace fee structures, Black Market mechanics, selling strategies, price data availability"
  confidence: high
  coverage: 90
  decision_blockers: 0
  research_blockers: 0

files_analyzed:
  - file: scoring.py
    path: src/scoring.py
    purpose: "Revenue calculation uses net_revenue = sell_price_min * (1 - tax_rate)"
    key_elements:
      - element: "net_revenue calculation"
        type: pattern
        location: "src/scoring.py:167"
        description: "Uses single tax_rate parameter (default 6.5%). Does not separately model the 2.5% setup fee."
    language: python
    lines: 240
  - file: albion_client.py
    path: src/albion_client.py
    purpose: "Fetches sell_price_min and buy_price_max from market data"
    key_elements:
      - element: MarketPrice
        type: class
        location: "src/albion_client.py:22"
        description: "Captures both sell_price_min (lowest sell order) and buy_price_max (highest buy order) per city"
    language: python
    lines: 120

patterns_found:
  - category: architecture
    pattern: "Simplified tax model"
    description: |
      The codebase models tax as a single deduction from sell price: net_revenue = sell_price * (1 - tax_rate).
      In reality, the 2.5% setup fee is charged on the listing price at time of posting (not on sale),
      and the sales tax (4% Premium / 8% normal) is charged when the item sells.
      The combined effect is close to 6.5% for Premium but the setup fee is non-refundable even if unsold.
    examples:
      - file: scoring.py
        location: "src/scoring.py:167"
        snippet: "net_revenue = product_price.sell_price_min * (1.0 - tax_rate)"
    prevalence: common

  - category: architecture
    pattern: "Uses sell_price_min for material buy costs"
    description: |
      When calculating material cost, the code uses sell_price_min of materials in the craft city.
      This assumes buying via instant-buy from sell orders. An alternative is placing buy orders
      (using buy_price_max as reference) which is cheaper but slower.
    examples:
      - file: scoring.py
        location: "src/scoring.py:152-153"
        snippet: "unit_material_price = mp.sell_price_min if mp.sell_price_min > 0 else mp.buy_price_max"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: "Scoring Engine"
      responsibility: "Applies tax deduction to compute net revenue"
      location: src/scoring.py
      relationship_to_domain: "Directly models market fee structure"
    - component: "API Client"
      responsibility: "Fetches raw price data from each city's marketplace"
      location: src/albion_client.py
      relationship_to_domain: "Provides sell/buy prices that feed into tax calculations"
  data_flow_involving_domain: |
    Market prices (per city) -> tax_rate applied as single deduction -> net_revenue computed.
    Missing: separate setup fee modeling, Premium vs non-Premium distinction, Black Market as sell destination.

