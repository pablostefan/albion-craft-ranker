  error_handling_in_domain: "Items with zero sell price are silently skipped"

# ===== MARKET DYNAMICS DEEP FINDINGS =====

market_dynamics_findings:
  marketplace_structure:
    description: |
      Albion Online has LOCAL marketplaces - each city has its own independent auction house.
      There is no global auction house. Players must physically travel to a city to buy/sell there.
      This creates price differentials between cities, enabling arbitrage and transport trading.
    cities_with_marketplaces:
      - "Martlock"
      - "Bridgewatch"
      - "Lymhurst"
      - "Fort Sterling"
      - "Thetford"
      - "Caerleon"
      - "Brecilien"
      - "Black Market (Caerleon - special NPC marketplace)"
    source: "https://wiki.albiononline.com/wiki/Marketplace"

  fee_structure:
    setup_fee:
      rate: 2.5%
      description: |
        Charged when posting any sell order. Non-refundable even if the item does not sell.
        Calculated on the listing price. This is a cost of participating in the market.
      deduction_timing: "At time of listing"
      refundable: false
    sales_tax:
      normal_rate: 8.0%
      premium_rate: 4.0%
      description: "Charged on the sale price when the item actually sells."
      deduction_timing: "At time of sale completion"
    total_effective_rates:
      premium: "6.5% effective (2.5% setup + 4% sales tax)"
      normal: "10.5% effective (2.5% setup + 8% sales tax)"
    listing_duration: "30 days (sell orders expire after 30 days)"
    source: "https://wiki.albiononline.com/wiki/Marketplace"

  black_market:
    location: "Caerleon (underground NPC marketplace)"
    description: |
      The Black Market is Albion's primary item sink mechanism. When mobs are killed in the open world,
      the system generates buy orders on the Black Market for the type of loot those mobs should drop.
      
      Key mechanics:
      1. Mob kills generate buy orders for specific items (matching the mob's potential loot table)
      2. If buy orders go unfilled, prices rise over time (increased demand)
      3. Players sell crafted items to the Black Market NPCs at these buy order prices
      4. Items sold to the Black Market become mob drops for other players
      5. Higher quality items can be used to fill lower quality buy orders (quality tip)
      6. Only EQUIPMENT can be sold (no resources, consumables, or other items)
    pricing_dynamics: |
      Black Market prices are purely driven by mob kill volume and unfilled demand.
      When many players are killing mobs in a specific zone/tier, demand rises for that tier's equipment.
      When crafters fill the orders, prices drop back down.
      Peak prices often occur during active PvP/PvE hours.
    sell_strategy: |
      - Monitor buy order prices via API (buy_price_max in Caerleon/"Black Market" location)
      - Compare Black Market buy prices vs regular market sell prices
      - Black Market is often more profitable for mid-tier (T4-T6) items with high mob kill volume
      - Quality tip: craft higher quality items to fill lower quality orders for bonus silver
    source: "https://wiki.albiononline.com/wiki/Black_Market"

  selling_strategies:
    instant_sell:
      description: "Sell to existing buy orders. Immediate silver, lower price."
      use_case: "Fast liquidation, high-demand items"
    sell_order:
      description: "Post a sell order at desired price. Higher potential price, 2.5% setup fee risk."
      use_case: "Patient selling of high-margin items"
    black_market:
      description: "Sell to Black Market NPCs in Caerleon for mob loot generation."
      use_case: "Equipment items, especially mid-tier. Can be very profitable during peak PvP hours."
    cross_city_arbitrage:
      description: "Buy in one city, transport, sell in another where prices are higher."
      use_case: "Exploiting price differentials between cities"
      risk: "Transport through PvP zones, ganking risk"

  api_price_data:
    description: |
      The AODP API provides both sell_price_min (lowest sell order) and buy_price_max (highest buy order)
      for each item/city/quality combination. This enables modeling all selling strategies.
    relevant_endpoints:
      current_prices: "/api/v2/stats/prices/{items}.json?locations={cities}&qualities={q}"
      historical: "/api/v2/stats/history/{items}.json?date={start}&end_date={end}&locations={city}&qualities={q}&time-scale=24"
    location_identifiers:
      - "Martlock"
      - "Bridgewatch"
      - "Lymhurst"
      - "Fort Sterling"
      - "Thetford"
      - "Caerleon"
      - "Brecilien"
      - "Black Market"
    source: "https://www.albion-online-data.com/api"

open_questions:
  - question: "Is 'Black Market' the exact location string for the AODP API?"
    context: "Need to verify the exact location string used to query Black Market prices. Could be 'Black Market' or 'BlackMarket' or a different identifier."
