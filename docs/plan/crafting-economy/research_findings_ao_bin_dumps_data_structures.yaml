plan_id: crafting-economy
objective: "Research ao-data/ao-bin-dumps repository data structures for auto-generating recipes.csv"
focus_area: ao_bin_dumps_data_structures
created_at: "2025-07-20T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  1. items.json contém 3,982 itens craftáveis distribuídos em 18 categorias. O projeto atual cobre ~327 receitas (apenas cloth armor) — cobrindo 8.2% do total craftável.
  2. craftingrequirements pode ser dict (3,170 itens) ou list (812 itens — receitas alternativas com ARTEFACT_TOKEN). craftresource pode ser dict (1,988 — recurso único) ou list (2,320 — múltiplos recursos).
  3. Enchantments seguem padrão hierárquico: base.enchantments.enchantment[].craftingrequirements substitui os materiais (ex: T4_CLOTH → T4_CLOTH_LEVEL1@1). upgraderequirements define runes/souls/relics para upgrade path.
  4. craftingmodifiers.json mapeia bônus de cidade por @craftingcategory (44 categorias únicas), com valores 0.15–0.40 para Royal Cities e 0.01–0.26 para Outlands scaling por cluster quality.
  5. O recipes.csv atual (product_id, material_id, material_qty, focus_cost) suporta APENAS 1 material por linha — itens com artefatos (2+ recursos) exigem múltiplas linhas ou reestruturação do schema.

research_metadata:
  methodology: |
    Direct JSON download + Python analysis of items.json (~50MB) from raw.githubusercontent.com.
    Exhaustive field enumeration: iterated ALL categories, ALL craftingrequirements keys, ALL craftresource keys,
    ALL craftingcategory values. Sample items inspected per category: equipmentitem, weapon, simpleitem,
    consumableitem, mount, furnitureitem, journalitem, transformationweapon, crystalleagueitem, siegebanner, farmableitem.
    craftingmodifiers.json analyzed via raw fetch in prior research pass.
  scope: "Full items.json schema + craftingmodifiers.json schema + current recipes.csv gap analysis"
  confidence: high
  coverage: 95
  decision_blockers: 1  # RecipeLine schema can only hold 1 material per row — multi-resource items need design decision
  research_blockers: 0

