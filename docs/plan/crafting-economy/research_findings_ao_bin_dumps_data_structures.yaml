# ==============================================================
# SECTION 8: GAP ANALYSIS — CURRENT recipes.csv vs items.json
# ==============================================================

gap_analysis:
  current_recipes_csv:
    path: "data/recipes.csv"
    total_lines: 327
    columns: ["product_id", "material_id", "material_qty", "focus_cost"]
    coverage: "Cloth armor only (HEAD/ARMOR/SHOES × SET1/SET2/SET3 × T2-T8 × enchantments 0-4)"
    limitation_single_material: |
      Each row can only hold ONE material. Items requiring 2+ materials (faction weapons,
      mounts, transformation weapons, furniture, refined materials) cannot be properly
      represented in the current schema without multiple rows per product.
    current_pct_of_total: "8.2%"

  missing_categories:
    critical_high_volume:
      - category: "weapon"
        craftable_count: 754
        has_enchantments: 645
        note: "All weapons including faction variants — biggest profit potential"
      - category: "equipmentitem (non-cloth)"
        description: "Plate armor, leather armor, capes, bags, offhands, gatherer gear"
        note: "Current CSV only covers cloth armor (SET1/SET2/SET3)"
      - category: "simpleitem (refined materials)"
        craftable_count: 1364
        note: "Refining is high-volume, low-margin — focus-intensive players love this"
      - category: "consumableitem"
        craftable_count: 104
        note: "Potions and food — high volume, enchantment tiers"
    medium_priority:
      - category: "mount"
        craftable_count: 108
      - category: "furnitureitem"
        craftable_count: 199
      - category: "transformationweapon"
        craftable_count: 41
    low_priority:
      - category: "consumablefrominventoryitem"
        craftable_count: 322
        note: "Many are vanity/unlock items, not market-traded"
      - category: "journalitem"
        craftable_count: 133
        note: "Silver purchases, not craftable"
      - category: "crystalleagueitem"
        craftable_count: 29
        note: "Silver purchases"

  schema_design_decision:
    question: "How to represent multi-resource recipes in recipes.csv?"
    options:
      - option: "Multiple rows per product"
        description: "One row per material per product. Product T4_2H_BOW_KEEPER gets 2 rows."
        pros: "No schema change needed. Current load_recipes() works."
        cons: "Grouping logic needed in scoring.py. focus_cost duplicated across rows."
      - option: "JSON materials column"
        description: "Replace material_id/material_qty with JSON: [{id, qty}, ...]"
        pros: "Clean 1:1 product:row. Supports N materials."
        cons: "Breaks current CSV parsing. More complex."
      - option: "Expanded columns"
        description: "material_id_1, material_qty_1, material_id_2, material_qty_2, ..."
        pros: "Still plain CSV, easy to read."
        cons: "Max materials limited. Sparse for single-material items."
    recommendation_note: "This is a DESIGN DECISION for the planner — not a research recommendation."

# ==============================================================
# SECTION 9: PARSING RULES FOR AUTO-GENERATION
# ==============================================================

parsing_rules:
  description: |
    Rules a parser must follow to correctly extract recipes from items.json.
    These are FACTUAL observations from the data, not implementation suggestions.

  rule_1_normalize_collections:
    description: "Both craftingrequirements and craftresource can be dict or list. Always normalize to list."
    pattern: |
      if isinstance(cr, dict): cr = [cr]
      if isinstance(res, dict): res = [res]

  rule_2_skip_swap_transactions:
    description: "Items with @swaptransaction=true are purchases, not crafts."
    filter: "Skip if craftingrequirements has @swaptransaction == 'true'"

  rule_3_enchantments_are_separate_products:
    description: |
      Each enchantment level is a distinct product with distinct recipe.
      Product ID convention: {base_uniquename}@{enchantmentlevel}
      Example: T4_HEAD_CLOTH_SET1@2 uses T4_CLOTH_LEVEL2 instead of T4_CLOTH.

  rule_4_alternative_recipes:
    description: |
      When craftingrequirements is a list, each element is an ALTERNATIVE way to craft.
      Typically [standard_recipe, token_recipe]. For profit calculations, use index [0] (standard).

  rule_5_amountcrafted:
    description: |
      Some items produce multiple outputs per craft (@amountcrafted > 1).
      Material cost per unit = total_material_cost / amountcrafted.
      Common: potions (5), food (10), refined materials (1).

  rule_6_maxreturnamount_zero:
    description: |
      Resources with @maxreturnamount=0 (artefacts, grown animals, alchemy components)
      are NOT subject to resource return rate. Only standard materials benefit from RRR.

  rule_7_craftingcategory_maps_to_city_bonus:
    description: |
      The @craftingcategory field on each item maps 1:1 to craftingmodifier @name
      in craftingmodifiers.json. This determines which city bonus applies.

  rule_8_focus_cost_scaling:
    description: |
      Focus cost increases with enchantment level.
      Pattern for T4_HEAD_CLOTH_SET1: base=429, @1=750, @2=1313, @3=2298, @4=4021
      Roughly 1.75x multiplier per enchantment level.

