# ==============================================================
# SECTION 3: CRAFTING RECIPE SCHEMA
# ==============================================================

crafting_recipe_schema:
  description: |
    Every craftable item has a `craftingrequirements` field at the item level.
    Items with enchantments have ADDITIONAL craftingrequirements inside each
    enchantment entry. The enchanted version REPLACES the base recipe entirely
    (different material, different focus cost, different craft time).

  structural_polymorphism:
    craftingrequirements:
      as_dict: 3170
      as_list: 812
      explanation: |
        DICT (single recipe): Most items have exactly one way to craft them.
        LIST (alternative recipes): Items like faction weapons and refined materials
        offer 2+ alternative recipes. Example: T4_2H_BOW_KEEPER has [recipe_with_artefact, recipe_with_token].
        T4_CLOTH has [recipe_with_fiber+prev_tier, recipe_with_fiber+faction_token+prev_tier].
        The FIRST element in the list is typically the "standard" recipe.

    craftresource:
      as_dict: 1988
      as_list: 2320
      explanation: |
        DICT (single material): Items requiring only one resource type. Example: T4_HEAD_CLOTH_SET1 needs 8x T4_CLOTH.
        LIST (multiple materials): Items requiring 2+ different resources. Example: T4_2H_BOW_KEEPER needs 32x T4_PLANKS + 1x T4_ARTEFACT_2H_BOW_KEEPER.
        Parser MUST normalize both to list for uniform handling.

  craftingrequirements_fields:
    always_present:
      - field: "craftresource"
        type: "dict | list[dict]"
        purpose: "Material(s) required to craft"
        note: "Absent in silver-only/swap purchases (journals, crystal league)"
    common:
      - field: "@silver"
        type: string (numeric)
        purpose: "Silver cost to craft"
        default: "0"
      - field: "@time"
        type: string (numeric)
        purpose: "Crafting time in fractional minutes"
        example: "0.333 = 20 seconds"
      - field: "@craftingfocus"
        type: string (numeric)
        purpose: "Focus cost to apply focus bonus"
        note: "0 means focus cannot be used"
    optional:
      - field: "@amountcrafted"
        type: string (numeric)
        purpose: "Number of items produced per craft"
        default: "1 (implicit)"
        note: "Used by consumables (potions=5, food=10), refined materials (1)"
      - field: "@forcesinglecraft"
        type: string (boolean)
        purpose: "If false, allows batch crafting"
      - field: "@swaptransaction"
        type: string (boolean)
        purpose: "If true, this is a silver purchase (swap), not a craft"
        note: "Used by journals, farming seeds, crystal league tokens"
      - field: "@compensategold"
        type: string (numeric)
        purpose: "Gold compensation for certain purchases"
      - field: "@gold"
        type: string (numeric)
        purpose: "Gold cost"
      - field: "@returnproductnotresource"
        type: string (boolean)
        purpose: "If true, resource return gives back the product instead of materials"
      - field: "@salvageitemfactor"
        type: string (numeric)
        purpose: "Salvage return factor for items"
      - field: "@salvagesilverfactor"
        type: string (numeric)
        purpose: "Salvage silver return factor"
      - field: "@buildingfilter"
        type: string
        purpose: "Which crafting station building is required"
      - field: "@craftsingleperdefault"
        type: string (boolean)
        purpose: "Default to crafting single items"
      - field: "@craftbuttonlocaoverride"
        type: string
        purpose: "Localization key override for craft button text (e.g. 'Refine' instead of 'Craft')"
    special_nested:
      - field: "currency"
        type: dict
        purpose: "Faction currency cost"
        schema: "{@uniquename: 'FACTION_xxx', @amount: string(numeric)}"
        note: "Used for faction-locked purchases (e.g. faction mounts)"
      - field: "playerfactionstanding"
        type: dict
        purpose: "Faction standing requirement"
        schema: "{@faction: string, @minstanding: string(numeric)}"
      - field: "standing"
        type: dict
        purpose: "Standing requirement"
      - field: "vanityunlocked"
        type: present/absent flag
        purpose: "Whether a vanity item must be unlocked first"

  craftresource_fields:
    required:
      - field: "@uniquename"
        type: string
        purpose: "Unique identifier of the required material"
        example: "T4_CLOTH, T4_PLANKS, T4_ARTEFACT_2H_BOW_KEEPER"
      - field: "@count"
        type: string (numeric)
        purpose: "Quantity required"
    optional:
      - field: "@enchantmentlevel"
        type: string (numeric)
        purpose: "Required enchantment level of the material"
        note: "Only present for enchanted recipes. Value matches the enchantment level (1-4)"
      - field: "@maxreturnamount"
        type: string (numeric)
        purpose: "Maximum amount that can be returned via resource return"
        note: "Set to '0' for artefacts and special components to prevent them being returned"
      - field: "@preservequality"
        type: string (boolean)
        purpose: "Whether quality is preserved from input material"

# ==============================================================
# SECTION 4: ITEM-LEVEL CRAFTING FIELDS
# ==============================================================

item_level_crafting_fields:
  description: "Fields on the item object itself (not inside craftingrequirements)"
  fields:
    - field: "@uniquename"
      type: string
      purpose: "Primary identifier. Convention: T{tier}_{TYPE}[_{SUBTYPE}][_{SET/FACTION}]"
      examples:
        - "T4_HEAD_CLOTH_SET1"       # Scholar Cowl
        - "T4_2H_BOW_KEEPER"        # Keeper faction bow
        - "T4_CLOTH"                 # Refined cloth
        - "T4_CLOTH_LEVEL1"         # Enchanted cloth (level 1)
        - "T2_POTION_HEAL"          # Health potion
    - field: "@tier"
      type: string (numeric)
      purpose: "Item tier (2-8 for most craftables)"
    - field: "@craftingcategory"
      type: string
      purpose: "Maps directly to craftingmodifiers.json bonus categories"
      note: "44 unique values — see craftingcategory_values section"
    - field: "@shopcategory"
      type: string
      purpose: "Top-level shop category (weapons, head, armor, shoes, etc.)"
    - field: "@shopsubcategory1"
      type: string
      purpose: "Sub-category matching craftingcategory in most cases"
    - field: "@shopsubcategory2"
      type: string
      purpose: "Specific item sub-category (e.g. head_cloth_set1)"
    - field: "@maxqualitylevel"
      type: string (numeric)
      purpose: "Maximum quality level (1-5). Only equipment."
    - field: "@itemvalue"
      type: string (numeric)
      purpose: "Base item value used for various calculations"
    - field: "@weight"
      type: string (numeric)
      purpose: "Item weight for carry capacity calculations"
    - field: "@enchantmentlevel"
      type: string (numeric)
      purpose: "Base enchantment level of the item (usually 0)"
      note: "Only on simpleitem (refined materials)"
    - field: "@unlockedtocraft"
      type: string (boolean)
      purpose: "Whether item requires spec to unlock crafting"

# ==============================================================
# SECTION 5: ENCHANTMENT SYSTEM
# ==============================================================

enchantment_system:
  description: |
    Equipment and consumables may have an `enchantments` field containing
    `enchantment` (dict for single, list for multiple levels 1-4).
    Each enchantment level provides a COMPLETE REPLACEMENT recipe.
    
  structure:
    parent_key: "enchantments"
    child_key: "enchantment"
    polymorphism: "dict (single level) or list[dict] (multiple levels)"
    
  enchantment_fields:
    - field: "@enchantmentlevel"
      type: string (numeric)
      purpose: "Enchantment level (1, 2, 3, or 4)"
    - field: "@itempower"
      type: string (numeric)
      purpose: "Item power at this enchantment level"
    - field: "@durability"
      type: string (numeric)
      purpose: "Durability at this enchantment level"
    - field: "craftingrequirements"
      type: "dict | list[dict]"
      purpose: "COMPLETE recipe for crafting at this enchantment level"
      note: "Same schema as base craftingrequirements — fully replaces base"
    - field: "upgraderequirements"
      type: dict
      purpose: "Materials needed to UPGRADE from previous enchantment level"
      schema:
        upgraderesource:
          "@uniquename": "T{tier}_RUNE | T{tier}_SOUL | T{tier}_RELIC | T{tier}_AVALONIAN_ENERGY"
          "@count": "string (numeric)"
      note: "Upgrade path: base→@1 uses RUNE, @1→@2 uses SOUL, @2→@3 uses RELIC, @3→@4 uses AVALONIAN_ENERGY (varies)"

  enchanted_material_naming_convention: |
    Base material: T4_CLOTH
    Enchanted material: T4_CLOTH_LEVEL{N} where N = enchantment level (1-4)
    Pattern: {base_uniquename}_LEVEL{enchantment_level}
    
  enchanted_product_naming_convention: |
    Product IDs in recipes.csv use @N suffix: T4_HEAD_CLOTH_SET1@1
    This convention is NOT in items.json — it's derived by appending @{enchantmentlevel}
    to the base @uniquename.

  example_t4_head_cloth_set1:
    base:
      craftingfocus: 429
      time: "0.333"
      craftresource: {uniquename: "T4_CLOTH", count: 8}
    enchantment_1:
      craftingfocus: 750
      time: "0.5"
      craftresource: {uniquename: "T4_CLOTH_LEVEL1", enchantmentlevel: 1, count: 8}
      upgraderesource: {uniquename: "T4_RUNE", count: 96}
    enchantment_2:
      craftingfocus: 1313
      time: "0.667"
      craftresource: {uniquename: "T4_CLOTH_LEVEL2", enchantmentlevel: 2, count: 8}
      upgraderesource: {uniquename: "T4_SOUL", count: 96}
    enchantment_3:
      craftingfocus: 2298
      time: "0.833"
      craftresource: {uniquename: "T4_CLOTH_LEVEL3", enchantmentlevel: 3, count: 8}
      upgraderesource: {uniquename: "T4_RELIC", count: 96}
    enchantment_4:
      craftingfocus: 4021
      time: "1.25"
      craftresource: {uniquename: "T4_CLOTH_LEVEL4", enchantmentlevel: 4, count: 8}

