# ==============================================================
# SECTION 11: OPEN QUESTIONS & GAPS
# ==============================================================

open_questions:
  - question: "Should the auto-generator include ALL 3,982 craftable items or filter to market-relevant ones?"
    context: |
      Many items (crystal league tokens, journals, farmable seeds) are silver purchases or
      non-tradeable. Including them wastes API calls for price lookups.
    type: decision_blocker
    affects: ["recipe_auto_generation", "api_rate_management"]

  - question: "How should multi-material recipes be represented in recipes.csv?"
    context: |
      Current schema (1 material per row) cannot handle faction weapons (2 materials),
      transformation weapons (3 materials), or mounts (animal + material).
      See schema_design_decision section for options.
    type: decision_blocker
    affects: ["recipes_csv_schema", "scoring_engine", "recipe_auto_generation"]

  - question: "Should alternative recipes (craftingrequirements as list) be included?"
    context: |
      812 items have alternative recipes (usually standard + token variant).
      Token recipes use faction tokens which are harder to price.
    type: nice_to_know
    affects: ["recipe_auto_generation"]

gaps:
  - area: "formatted/items.json vs items.json"
    description: "Did not verify if formatted/items.json has identical content or additional processing"
    impact: nice_to_know
    affects: []

  - area: "Albion API item_id format for enchanted items"
    description: |
      items.json uses T4_HEAD_CLOTH_SET1 with separate enchantment objects.
      Albion API price endpoints use T4_HEAD_CLOTH_SET1@1 for enchanted items.
      Need to confirm this convention is consistent across all categories.
    impact: research_blocker
    affects: ["recipe_auto_generation", "api_price_lookups"]

  - area: "Black Market vs Royal Market pricing differences"
    description: "Items sold on Black Market (equipment) vs marketplace (consumables) have different pricing dynamics. Not researched in this scope."
    impact: nice_to_know
    affects: ["profit_calculation"]
