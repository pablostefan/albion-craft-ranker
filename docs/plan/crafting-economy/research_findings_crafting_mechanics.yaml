  key_relationships_to_domain:
    - from: main.py
      to: scoring.py
      relationship: "imports load_recipes, rank_items, save_ranking_csv"
    - from: scoring.py
      to: albion_client.py
      relationship: "imports AlbionAPIClient, MarketPrice; calls get_prices() and get_history_bulk()"

