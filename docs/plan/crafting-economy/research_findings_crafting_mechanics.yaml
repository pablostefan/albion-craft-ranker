plan_id: crafting-economy
objective: "Research Albion Online crafting economy, market dynamics, and existing tools/APIs to plan a comprehensive crafting profitability tool"
focus_area: crafting_mechanics
created_at: "2025-07-13T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - Crafting in Albion requires specific buildings (Warrior's Forge, Hunter's Lodge, Mage's Tower, etc.) and returns materials via Resource Return Rate (RRR).
  - RRR formula: 1 - 1/(1 + ProductionBonus/100). City bonuses range from 15.3% (base Royal City) to 53.9% (Royal City refining with city bonus + focus).
  - Crafting Focus (10K daily, 30K cap, Premium only) adds a flat +59% production bonus. FCE from specialization halves focus cost per 10K points.
  - Seven Royal Cities each boost specific item categories: e.g., Fort Sterling = Wood refining + Hammers + Plate Helmets + Cloth Armor.
  - Current codebase uses a fixed return_rate (15.2%) and focus_cost=0.0 for all recipes, missing dynamic city-based calculations entirely.

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search on codebase, fetch_webpage for Wiki pages (Crafting, Crafting_Focus, Resource_Return_Rate), ao-data/ao-bin-dumps GitHub repo for game data files"
  scope: "Deep examination of all crafting mechanics: buildings, specialization, Focus Cost Efficiency (FCE), Resource Return Rate (RRR), city bonuses, and game data dumps"
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 1  # craftingmodifiers.json exact schema not fully inspected

files_analyzed:
  - file: scoring.py
    path: src/scoring.py
    purpose: "Core ranking logic: calculates profit, margin, liquidity, and final weighted score for crafted items"
    key_elements:
      - element: RecipeLine
        type: class
        location: "src/scoring.py:14"
        description: "Dataclass holding product_id, material_id, material_qty, focus_cost. focus_cost is always 0.0 in current data."
      - element: RankedItem
        type: class
        location: "src/scoring.py:22"
        description: "Dataclass with all computed fields: material_cost, effective_craft_cost, sell_price_min, net_revenue, profit, margin_pct, focus_cost, profit_per_focus, liquidity_score, final_score"
      - element: rank_items
        type: function
        location: "src/scoring.py:108"
        description: "Main scoring function. Uses fixed return_rate and tax_rate params. effective_craft_cost = material_cost * (1 - return_rate). net_revenue = sell_price_min * (1 - tax_rate). Final score = weighted sum of normalized profit + liquidity."
      - element: _normalize
        type: function
        location: "src/scoring.py:98"
        description: "Min-max normalization for ranking. Returns 1.0 for all if values are equal."
    language: python
    lines: 240
  - file: albion_client.py
    path: src/albion_client.py
    purpose: "HTTP client for Albion Online Data Project API. Handles price fetching and history retrieval with exponential backoff."
    key_elements:
      - element: AlbionAPIClient
        type: class
        location: "src/albion_client.py:33"
        description: "API client supporting west/east/europe servers. get_prices() batches 120 items, get_history_bulk() batches 40 items."
      - element: MarketPrice
        type: class
        location: "src/albion_client.py:22"
        description: "Dataclass: item_id, city, quality, sell_price_min, buy_price_max, sell/buy dates"
    language: python
    lines: 120
  - file: main.py
    path: src/main.py
    purpose: "CLI entry point with argparse. Chains client -> recipes -> rank -> save."
    key_elements:
      - element: build_parser
        type: function
        location: "src/main.py:10"
        description: "Defines CLI params: --return-rate (default 0.152), --tax-rate (default 0.065), --quality (default 1), --profit-weight (0.7), --liquidity-weight (0.3)"
    language: python
    lines: 80
  - file: recipes.csv
    path: data/recipes.csv
    purpose: "Crafting recipes database. Currently covers T2-T8 cloth armor (SET1-SET3) with enchantments @0 through @4."
    key_elements:
      - element: CSV schema
        type: pattern
        location: "data/recipes.csv:1"
        description: "Columns: product_id, material_id, material_qty, focus_cost. All focus_cost values are 0.0."
    language: csv
    lines: 1000

patterns_found:
  - category: architecture
    pattern: "Fixed crafting parameters instead of dynamic calculation"
    description: |
      The codebase uses CLI-provided fixed values for return_rate (0.152) and tax_rate (0.065) instead of
      calculating them dynamically based on city, building type, specialization level, and Premium status.
      This means the tool cannot optimize across cities or account for Focus usage.
    examples:
      - file: main.py
        location: "src/main.py:22-23"
        snippet: |
          p.add_argument("--return-rate", type=float, default=0.152)
          p.add_argument("--tax-rate", type=float, default=0.065)
      - file: scoring.py
        location: "src/scoring.py:166"
        snippet: "effective_craft_cost = material_cost * (1.0 - return_rate)"
    prevalence: common

  - category: architecture
    pattern: "Focus cost data gap"
    description: |
      RecipeLine includes focus_cost field but all CSV values are 0.0. The profit_per_focus calculation
      therefore always yields 0.0, making Focus-based optimization impossible.
    examples:
      - file: recipes.csv
        location: "data/recipes.csv:2-20"
        snippet: "T2_ARMOR_CLOTH_SET1,T2_CLOTH,16.0,0.0"
    prevalence: common

  - category: naming
    pattern: "Portuguese naming convention throughout"
    description: "All comments, CLI helps, error messages, and variable documentation use Brazilian Portuguese."
    examples:
      - file: main.py
        location: "src/main.py:13"
        snippet: 'description="Rankeia melhores itens para craftar no Albion (lucro + liquidez)."'
    prevalence: common

  - category: structure
    pattern: "Flat recipe model (one material per line)"
    description: |
      Each RecipeLine represents one material input; multi-material recipes are grouped by product_id.
      This is flexible but doesn't capture artifact materials (which never get returned via RRR).
    examples:
      - file: scoring.py
        location: "src/scoring.py:140-141"
        snippet: |
          grouped: Dict[str, List[RecipeLine]] = {}
          for line in recipe_lines:
              grouped.setdefault(line.product_id, []).append(line)
    prevalence: common

