    context: "This file likely contains city-specific production bonus values programmatically, but its structure was not inspected in detail. Needed to dynamically calculate RRR per city."
    type: research
    affects: ["dynamic-rrr-calculation", "city-optimization"]
  - question: "Does the AODP API expose Black Market prices separately?"
    context: "Black Market is in Caerleon but uses buy orders from NPCs. Need to verify if 'Black Market' is a valid location string for the API."
    type: research
    affects: ["black-market-integration"]
  - question: "What are the exact base focus costs for crafting (not refining)?"
    context: "Wiki only provided refining focus costs table. Crafting focus costs may differ and need the craftingmodifiers.json or items.json to extract."
    type: research
    affects: ["focus-cost-population", "profit-per-focus-calculation"]

