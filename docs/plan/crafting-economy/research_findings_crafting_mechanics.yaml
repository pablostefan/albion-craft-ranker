  components_relevant_to_domain:
    - component: "Scoring Engine (scoring.py)"
      responsibility: "Calculates profit per item and ranks them"
      location: src/scoring.py
      relationship_to_domain: "Domain core - directly uses crafting parameters (RRR, tax)"
    - component: "API Client (albion_client.py)"
      responsibility: "Fetches market prices and history from AODP"
      location: src/albion_client.py
      relationship_to_domain: "Domain dependency - provides price inputs for crafting cost calculations"
    - component: "Recipe Database (recipes.csv)"
      responsibility: "Stores crafting recipes with material requirements"
      location: data/recipes.csv
      relationship_to_domain: "Domain data source - defines what can be crafted and material quantities"
  interfaces_used_by_domain:
    - interface: "AODP REST API v2"
      location: "https://west.albion-online-data.com/api/v2/"
      usage_pattern: "GET /stats/prices/{items}.json for current prices, GET /stats/history/{items}.json for volume/liquidity"
  data_flow_involving_domain: |
    recipes.csv -> load_recipes() -> RecipeLine list -> rank_items() fetches prices via AlbionAPIClient
    -> calculates effective_craft_cost using fixed return_rate -> computes profit and final_score
