# ===== CRAFTING MECHANICS DEEP FINDINGS =====

crafting_mechanics_findings:
  buildings:
    description: |
      Crafting in Albion requires specific crafting stations/buildings. Each building type handles
      a category of items. Buildings can be placed on player islands, in hideouts, or used in cities.
      City buildings provide crafting bonuses; island buildings do not (unless near a city with bonuses).
    building_types:
      - name: "Warrior's Forge"
        crafts: "Plate armor, shields"
      - name: "Hunter's Lodge"
        crafts: "Leather armor, off-hand items"
      - name: "Mage's Tower"
        crafts: "Cloth armor, magical off-hands"
      - name: "Toolmaker"
        crafts: "Tools, gathering gear"
      - name: "Cook"
        crafts: "Food (consumables)"
      - name: "Alchemist's Lab"
        crafts: "Potions (consumables)"
      - name: "Smelter / Tanner / Weaver / Stonemason / Lumbermill"
        crafts: "Resource refining (ore->bars, hide->leather, fiber->cloth, stone->blocks, wood->planks)"
      - name: "Various weapon smiths"
        crafts: "Weapons by type (swords, bows, staves, etc.)"
    source: "https://wiki.albiononline.com/wiki/Crafting"

  specialization_and_fce:
    description: |
      The Destiny Board has crafting specialization nodes that grant Focus Cost Efficiency (FCE) points.
      Each 10,000 FCE points halves the focus cost for that item type.
      Max FCE varies: ~40K for refining, ~55K for food/potions.
    formula: "Effective Focus Cost = Base Focus Cost / (2 ^ (FCE / 10000))"
    example: "At 20K FCE: focus cost = base / 4. At 40K FCE: focus cost = base / 16."
    base_focus_costs_refining:
      T2: { enchant_0: 9, enchant_1: null, enchant_2: null, enchant_3: null, enchant_4: null }
      T3: { enchant_0: 18, enchant_1: null, enchant_2: null, enchant_3: null, enchant_4: null }
      T4: { enchant_0: 36, enchant_1: 36, enchant_2: 36, enchant_3: 36, enchant_4: 36 }
      T5: { enchant_0: 72, enchant_1: 72, enchant_2: 72, enchant_3: 72, enchant_4: 72 }
      T6: { enchant_0: 144, enchant_1: 144, enchant_2: 144, enchant_3: 144, enchant_4: 144 }
      T7: { enchant_0: 288, enchant_1: 288, enchant_2: 288, enchant_3: 288, enchant_4: 288 }
      T8: { enchant_0: 576, enchant_1: 576, enchant_2: 576, enchant_3: 576, enchant_4: 576 }
    daily_focus: 10000
    max_focus: 30000
    premium_only: true
    source: "https://wiki.albiononline.com/wiki/Crafting_Focus"

  resource_return_rate:
    formula: "RRR = 1 - 1 / (1 + ProductionBonus / 100)"
    explanation: |
      ProductionBonus is the sum of all applicable bonuses (city, building, focus).
      The RRR determines what fraction of base materials are returned after crafting.
      IMPORTANT: Artifact materials are NEVER returned - only raw resources.
    tables:
      base_no_bonus:
        production_bonus_pct: 0
        rrr_pct: 0.0
        location: "Anywhere without bonuses"
      royal_city_base:
        production_bonus_pct: 18
        rrr_pct: 15.3
        location: "Any Royal City (non-specialized item)"
      royal_city_with_city_bonus:
        production_bonus_pct: 58
        rrr_pct: 36.7
        location: "Royal City crafting specialized item (refining)"
        note: "Crafting bonus is 33% -> 24.8% RRR for non-refining"
      royal_city_with_focus:
        production_bonus_pct: 77
        rrr_pct: 43.5
        location: "Royal City base + Focus (18 + 59)"
      royal_city_full_bonus_refining:
        production_bonus_pct: 117
        rrr_pct: 53.9
        location: "Royal City + city refining bonus (58) + Focus (59)"
      royal_city_full_bonus_crafting:
        production_bonus_pct: 92
        rrr_pct: 47.9
        location: "Royal City + city crafting bonus (33) + Focus (59)"
      royal_island:
        production_bonus_pct: 0
        rrr_pct: 0.0
        location: "Royal Island (no bonuses)"
      royal_island_with_city_bonus:
        production_bonus_pct: 15
        rrr_pct: 13.0
        location: "Royal Island with city crafting bonus"
    focus_bonus: "+59% flat addition to production bonus when using Crafting Focus"
    source: "https://wiki.albiononline.com/wiki/Resource_Return_Rate"

  city_specializations:
    description: |
      Each Royal City grants crafting/refining bonuses for specific item categories.
      The bonus increases both the base production bonus and the RRR.
    cities:
      Martlock:
        refining: "Hide"
        weapons: ["Axe", "Quarterstaff", "Frost Staff"]
        armor: "Plate Boots"
        other: "Off-Hand items"
      Bridgewatch:
        refining: "Stone (Rock)"
        weapons: ["Crossbow", "Dagger", "Cursed Staff"]
        armor: ["Plate Armor (Chest)", "Cloth Shoes"]
      Lymhurst:
        refining: "Fiber"
        weapons: ["Sword", "Bow", "Arcane Staff"]
        armor: ["Leather Helmet", "Leather Shoes"]
      Fort_Sterling:
        refining: "Wood"
        weapons: ["Hammer", "Spear", "Holy Staff"]
        armor: ["Plate Helmet", "Cloth Armor (Chest)"]
      Thetford:
        refining: "Ore"
        weapons: ["Mace", "Nature Staff", "Fire Staff"]
        armor: ["Leather Armor (Chest)", "Cloth Helmet"]
      Caerleon:
        refining: null
        weapons: ["War Gloves", "Shapeshifter"]
        other: ["Gathering Gear", "Tools", "Food"]
      Brecilien:
        refining: null
        other: ["Capes", "Bags", "Potions"]
    source: "https://wiki.albiononline.com/wiki/Resource_Return_Rate"

  rest_bonuses:
    description: "Crafting Rests in Hideouts/Territories provide additional bonuses based on zone quality."
    types:
      Arthurs_Rest: "Melee weapons, Plate armor"
      Merlyns_Rest: "Ranged weapons, Nature staff, Leather armor"
      Morganas_Rest: "Magic staves, Cloth armor"
    source: "https://wiki.albiononline.com/wiki/Resource_Return_Rate"

  game_data_sources:
    ao_bin_dumps:
      repo: "https://github.com/ao-data/ao-bin-dumps"
      stars: 127
      key_files:
        - file: "items.json"
          description: "Complete item definitions with IDs, tiers, enchantments, and crafting requirements"
          last_updated: "20260311"
        - file: "items.xml"
          description: "XML version of item definitions"
        - file: "craftingmodifiers.json"
          description: "Crafting modifier data (city bonuses, building modifiers)"
          last_updated: "20240108"
        - file: "buildings.json"
          description: "Building definitions and their crafting capabilities"
          last_updated: "20260401"
        - file: "formatted/items.txt"
          description: "Formatted item IDs for use with the AODP API"
        - file: "formatted/items.json"
          description: "JSON version of formatted item IDs"
        - file: "formatted/world.txt"
          description: "Location/city identifiers for API use"
        - file: "formatted/world.json"
          description: "JSON version of location identifiers"
        - file: "loot.json"
          description: "Loot tables - relevant for understanding Black Market demand patterns"
          last_updated: "20260223"
      note: "Actively maintained. Can be used to auto-generate recipes and populate focus costs."
    item_id_format: "T{tier}_{ITEM_TYPE}@{enchantment} (e.g., T4_ARMOR_CLOTH_SET1@2)"

open_questions:
