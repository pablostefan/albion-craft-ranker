                likelihood: medium
                impact: low
                mitigation: "Fallback to base RRR (15.2%) for unknown cities. Log warning."
            tech_stack:
              - "Python 3.11+"
              - "json (stdlib)"
            test_coverage: "Unit tests for each city/category/focus combination against known values"

      - id: c_003
        title: "API Client v2 — Multi-City & Black Market"
        agent: gem-implementer
        description: |
          Extend src/albion_client.py to support:
          - Multi-city price fetching: get_prices() accepts list of cities (all 9 + 'Black Market')
          - Black Market location: 'Black Market' as valid location for sell prices
          - Smarter batching: respect 4096 char URL limit, 120 items/price batch, 40 items/history batch
          - Rate limit tracking: 180 req/min, 300 req/5min — add internal counter and auto-throttle
          - Price freshness: expose sell_price_min_date and buy_price_max_date for freshness scoring
          - Replace urllib with httpx for async support (FastAPI integration)
          - Connection pooling for repeated requests

          Preserve backward compatibility with existing get_prices() and get_history_bulk() signatures.
          Add new async variants: aget_prices(), aget_history_bulk().
        wave: 1
