      - id: c_005
        title: "Scoring Engine v2 — Dynamic RRR, Multi-Material, BM Modes"
        agent: gem-implementer
        description: |
          Rewrite src/scoring.py to support the v2 scoring requirements:

          1. Multi-material support: iterate Recipe.materials (1:N) instead of flat RecipeLine
          2. Dynamic RRR: accept RRR engine instance, calculate per-material RRR
             - Artifact materials (is_artifact_component=True) get RRR=0.0
             - Regular materials get RRR from rrr_engine.calculate_rrr()
          3. Separated taxes: setup_fee (2.5%) + sales_tax (4% Premium / 8% Normal)
          4. New metrics:
             - return_rate_pct = (profit / total_material_cost) × 100 — PRIMARY metric
             - profit_per_focus = (profit_with_focus - profit_without_focus) / focus_cost
             - freshness_score = inverse of max(sell_price_age, material_price_age)
          5. Black Market comparison:
             - Calculate profit for marketplace sell_price AND BM buy_price_max
             - Return both in result for comparison mode
          6. Configurable weights via ScoringConfig dataclass
          7. Material cost strategy: instant_buy (sell_price_min) vs buy_order (buy_price_max)

          Preserve save_ranking_csv() but update columns to match new metrics.
          Keep backward-compatible rank_items() that wraps rank_items_v2() with defaults.
        wave: 1
        priority: high
