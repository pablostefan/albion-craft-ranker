            reason: "Initial plan creation"
            timestamp: "2026-04-12T00:00:00Z"
            estimated_effort: medium
            estimated_files: 2
            estimated_lines: 180
            focus_area: "RRR calculation and city bonus parsing"
            verification:
              - "calculate_rrr('cloth', 'Lymhurst', False) ≈ 0.248"
              - "calculate_rrr('cloth', 'Bridgewatch', False) ≈ 0.152"
              - "calculate_rrr('cloth', 'Lymhurst', True) ≈ 0.479"
              - "Artifact materials return RRR = 0.0"
            acceptance_criteria:
              - "RRR values match known verification values within 1% tolerance"
              - "All 9 cities supported with correct category bonuses"
              - "Focus toggle changes RRR correctly"
