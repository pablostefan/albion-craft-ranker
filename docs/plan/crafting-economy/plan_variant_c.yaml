waves:
  - wave: 1
    name: "Parallel Foundation"
    objective: "Build all independent core modules simultaneously — recipe parser, RRR engine, API client, schemas, scoring engine, Next.js scaffold, and UI design system"
    contracts_in: []
    contracts_out:
      - "Recipe/RecipeMaterial dataclasses + parse_items() function"
      - "calculate_rrr() function + CityModifiers data"
      - "Extended AlbionAPIClient with multi-city/BM support"
      - "Pydantic schemas + TypeScript types (shared API contract)"
      - "rank_items_v2() function with new scoring logic"
      - "Next.js app shell with routing and Tailwind"
      - "Design tokens and component specs"
    tasks:
      - id: c_001
        title: "Recipe Auto-Generation Parser"
        agent: gem-implementer
        description: |
          Create src/recipe_parser.py that parses ao-bin-dumps/items.json to extract all
          craftable recipes. Must handle:
          - Polymorphism: craftresource can be dict (single material) or list (multiple materials)
          - Polymorphism: craftingrequirements can be dict (single tier) or list (multiple tiers/enchants)
          - Artifact detection: items with @maxreturnamount='0' are artifacts (no RRR on their materials)
          - 1:N relationship: each Recipe has N RecipeMaterial entries
          - Exclude @swaptransaction=true items (journals, not real crafts)
          - Extract focus_cost from @craftingfocus attribute
          - Extract enchantment tiers from @enchantmentlevel
          - Extract item category from @shopsubcategory or craftingcategory

          Output: Recipe dataclass (product_id, category, tier, enchantment, is_artifact,
          focus_cost, materials: List[RecipeMaterial]) and RecipeMaterial dataclass
          (material_id, quantity, is_artifact_component).

          Include a CLI script to download items.json from ao-bin-dumps GitHub release
          and run the parser, outputting stats (total items parsed, by category, artifacts found).
        wave: 1
        priority: high
        status: pending
        prototype: false
        covers:
          - "Cobertura de receitas ≥ 3,500 itens craftáveis"
          - "Materiais de artefato não recebem RRR"
        dependencies: []
        conflicts_with: []
        context_files:
          - path: "src/scoring.py"
            description: "Current RecipeLine dataclass to understand existing schema and evolve from"
          - path: "docs/plan/crafting-economy/research_findings_ao_bin_dumps_data_structures.yaml"
            description: "Detailed analysis of items.json polymorphic patterns and field paths"
          - path: "docs/plan/crafting-economy/research_findings_crafting_mechanics.yaml"
            description: "Artifact identification rules and crafting category mappings"
        file_targets:
          - "src/recipe_parser.py"
          - "src/models.py"
          - "scripts/download_game_data.py"
          - "tests/test_recipe_parser.py"
        planning_pass: 1
        planning_history:
          - pass: 1
            reason: "Initial plan creation"
            timestamp: "2026-04-12T00:00:00Z"
            estimated_effort: large
            estimated_files: 3
            estimated_lines: 250
            focus_area: "Recipe parsing and data modeling"
            verification:
              - "Parser extracts ≥ 3,500 unique craftable items from items.json"
              - "Artifact items correctly identified via @maxreturnamount='0'"
              - "1:N materials relationship preserved (e.g., artifact weapons have base materials + artifact component)"
              - "Enchantment tiers correctly extracted (0-4)"
              - "Items with @swaptransaction=true excluded"
            acceptance_criteria:
              - "parse_items() returns ≥ 3,500 Recipe objects"
              - "Each Recipe has ≥ 1 RecipeMaterial"
              - "Artifact materials have is_artifact_component=True"
              - "Unit tests pass with sample items.json subset"
            failure_modes:
              - scenario: "items.json format changed in newer ao-bin-dumps release"
                likelihood: low
                impact: high
                mitigation: "Pin to known working commit hash. Add schema validation on parse."
              - scenario: "Polymorphic fields missed — some items not parsed"
                likelihood: medium
                impact: high
                mitigation: "Research documents all patterns. Parser logs warnings for unhandled structures. Validation counts total items."
            tech_stack:
              - "Python 3.11+"
              - "dataclasses"
              - "json (stdlib)"
            test_coverage: "Unit tests for polymorphic parsing, artifact detection, enchantment extraction"

      - id: c_002
        title: "Dynamic RRR Engine"
        agent: gem-implementer
        description: |
          Create src/rrr_engine.py that calculates Resource Return Rate dynamically per item
          based on city and category. Must:
          - Parse ao-bin-dumps/craftingmodifiers.json to extract city bonuses by crafting category
          - Implement RRR formula: RRR = 1 - 1/(1 + ProductionBonus/100)
          - Base production bonus: 15.2% (no city bonus, no focus)
          - City bonus: +15% for matching category (e.g., cloth in Lymhurst)
          - Focus bonus: +43.5% flat added to production bonus when focus is used
          - Support all 9 locations: 7 Royal cities + Caerleon + Brecilien
          - Expose calculate_rrr(category, city, use_focus, spec_bonus=0) → float
          - Artifacts excluded: if is_artifact_component=True, return RRR=0.0

          Known verification values from research:
          - No bonus, no focus: RRR = 15.2% (ProductionBonus = 17.9%)
          - City bonus, no focus: RRR = 24.8% (ProductionBonus = 32.9%)
          - City bonus + focus: RRR = 47.9% (ProductionBonus = 92.0%)
        wave: 1
        priority: high
        status: pending
        prototype: false
        covers:
          - "RRR calculado dinamicamente por cidade/categoria"
          - "Materiais de artefato não recebem RRR"
        dependencies: []
        conflicts_with: []
        context_files:
          - path: "docs/plan/crafting-economy/research_findings_crafting_mechanics.yaml"
            description: "RRR formula, city bonus values, focus bonus calculations"
          - path: "docs/plan/crafting-economy/consolidated_research_report.yaml"
            description: "City specialization mappings"
        file_targets:
          - "src/rrr_engine.py"
          - "tests/test_rrr_engine.py"
        planning_pass: 1
        planning_history:
