plan_id: crafting-economy
variant: c
approach: |
  Speed-first: Maximum parallelism, minimum waves. Backend and frontend start simultaneously
  from wave 1 using pre-agreed API contracts (Pydantic schemas + TypeScript types).
  All 7 foundation tasks run in parallel with zero dependencies.
  Accept higher integration risk in exchange for 4-wave completion.
  Black Market logic embedded into core tasks rather than separate feature wave.
objective: |
  Evolve the Albion Craft Ranker from a CLI tool covering 90 cloth armor items to a
  full-stack web application (FastAPI + Next.js) covering 3,982+ craftable items with
  dynamic RRR, focus optimization, cross-city optimization, optional Black Market,
  and return_rate_pct as the primary visible metric.
created_at: "2026-04-12T00:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  total_tasks: 15
  total_waves: 4
  wave_1_task_count: 7
  total_dependencies: 26
  risk_score: high
  estimated_complexity: complex

tldr: |
  4-wave plan with 7 parallel foundation tasks in wave 1 (recipe parser, RRR engine,
  API client v2, shared schemas, scoring v2, Next.js scaffold, UI design system).
  Wave 2 builds backend server + frontend pages in parallel using contracts from wave 1.
  Wave 3 wires everything together. Wave 4 validates with E2E tests and writes docs.
  15 total tasks. High risk due to aggressive parallelism — mitigated by strict contracts.

open_questions:
  - "ao-bin-dumps items.json exact field paths for enchantment tiers — verified in research but parser must handle edge cases"
  - "Brecilien crafting bonuses — newer city, may not be in older craftingmodifiers.json versions"

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: "Wave 2 integration mismatches — FastAPI response shapes don't match TypeScript types"
      likelihood: medium
      impact: high
      mitigation: "Wave 1 produces shared Pydantic schemas (c_004) that auto-generate TypeScript types. Both backend and frontend consume the same contract."
    - scenario: "items.json polymorphism causes parser to miss craftable items (coverage < 3500)"
      likelihood: medium
      impact: critical
      mitigation: "c_001 includes validation step counting parsed items. Acceptance criterion: ≥3500 items. Research findings document all polymorphic patterns (dict→list for craftresource, craftingrequirements)."
    - scenario: "AODP API rate limits block cross-city price fetching (7+ cities × 3982 items)"
      likelihood: high
      impact: high
      mitigation: "c_003 implements aggressive batching (120 items/request), cache layer with TTL, and staggered refresh. Cross-city fetches prioritize user-selected cities."
    - scenario: "Scoring engine v2 produces different rankings than expected due to RRR/tax formula changes"
      likelihood: medium
      impact: medium
      mitigation: "c_005 includes unit tests comparing known-good calculations from research (e.g., T4_CLOTH in Lymhurst = 24.8% RRR). Acceptance criteria include specific verification values."
    - scenario: "Frontend ranking page too slow with 3982+ items"
      likelihood: medium
      impact: medium
      mitigation: "Backend pagination (default 100 items per page). Frontend virtual scrolling. API response time target: < 2s for filtered results."
  assumptions:
    - "ao-bin-dumps items.json and craftingmodifiers.json are available and parseable (verified in research phase)"
    - "AODP API v2 endpoints remain stable (west.albion-online-data.com)"
    - "Python 3.11+ available for FastAPI with async support"
    - "Node.js 18+ available for Next.js 14"
    - "Current albion_client.py retry logic (429 backoff) is sufficient for production load"
    - "Premium tax rate (4%) is the default — Normal (8%) offered as toggle"

implementation_specification:
  code_structure: |
    Monorepo with backend (Python/FastAPI) and frontend (Next.js/TypeScript) in separate directories.
    Backend extends existing src/ with new modules. Frontend is a new top-level directory.
    Shared contract via Pydantic schemas that generate TypeScript types.
  affected_areas:
    - "src/scoring.py — heavy rewrite for v2 scoring with dynamic RRR, multi-material, BM modes"
    - "src/albion_client.py — extend for multi-city batching, BM location support"
    - "src/ — new modules: recipe_parser.py, rrr_engine.py, cross_city.py, schemas.py"
    - "src/api/ — new FastAPI application with routes, cache, background tasks"
    - "frontend/ — new Next.js application with ranking table, filters, item detail"
    - "requirements.txt — add fastapi, uvicorn, pydantic, httpx"
    - "data/ — recipes.csv replaced by auto-generated recipe data from items.json"
  component_details:
    - component: "RecipeParser"
      responsibility: "Parse ao-bin-dumps/items.json to extract all craftable recipes with 1:N materials, enchantments, artifact detection"
      interfaces:
        - "parse_items(items_json_path) → List[Recipe]"
        - "Recipe dataclass: product_id, category, tier, enchantment, is_artifact, materials: List[RecipeMaterial]"
        - "RecipeMaterial dataclass: material_id, quantity, is_artifact_component (no RRR if True)"
    - component: "RRREngine"
      responsibility: "Calculate dynamic Resource Return Rate per item based on city, category, focus, specialization"
      interfaces:
        - "load_modifiers(craftingmodifiers_json_path) → CityModifiers"
        - "calculate_rrr(category, city, use_focus, spec_bonus) → float"
        - "RRR formula: 1 - 1/(1 + ProductionBonus/100)"
    - component: "ScoringEngine v2"
      responsibility: "Rank items by configurable weighted metrics including return_rate_pct as primary visible metric"
      interfaces:
        - "rank_items_v2(recipes, prices, rrr_engine, config) → List[RankedItemV2]"
        - "RankedItemV2: product_id, material_cost, effective_cost, revenue, profit, return_rate_pct, profit_per_focus, liquidity_score, freshness_score, final_score, best_city, sell_strategy"
    - component: "CrossCityOptimizer"
      responsibility: "For each item, evaluate profitability across all cities and recommend the best one"
      interfaces:
        - "optimize(item_id, recipes, prices, rrr_engine) → List[CityResult]"
        - "CityResult: city, rrr, profit, return_rate_pct, is_best"
    - component: "FastAPI Backend"
      responsibility: "REST API serving ranked items with filters, city bonuses, config. In-memory cache with TTL."
      interfaces:
        - "GET /api/items?city=&category=&tier=&enchantment=&sell_strategy=&sort_by=&page=&per_page="
        - "GET /api/items/{item_id}"
        - "GET /api/cities"
        - "GET /api/config"
    - component: "Next.js Dashboard"
      responsibility: "Responsive web UI with sortable ranking table, filters, BM toggle, item detail with cost breakdown"
      interfaces:
        - "/ — Ranking page with RankingTable, FilterBar, WeightConfig, BlackMarketToggle"
        - "/items/[id] — Item detail with cost breakdown, city comparison, price history"
  dependencies:
    - component: "FastAPI Backend"
      relationship: "Imports RecipeParser, RRREngine, ScoringEngine, CrossCityOptimizer, AlbionAPIClient"
    - component: "Next.js Dashboard"
      relationship: "Consumes FastAPI REST endpoints via fetch/SWR. Types generated from Pydantic schemas."
    - component: "ScoringEngine v2"
      relationship: "Uses RRREngine for dynamic rates, RecipeParser for 1:N materials, AlbionAPIClient for prices"
    - component: "CrossCityOptimizer"
      relationship: "Uses RRREngine + AlbionAPIClient to compare cities"
  integration_points:
    - "FastAPI ↔ Next.js: REST API with JSON responses matching Pydantic schemas"
    - "RecipeParser → ScoringEngine: Recipe/RecipeMaterial dataclasses"
    - "RRREngine → ScoringEngine: calculate_rrr() function"
    - "AlbionAPIClient → ScoringEngine/CrossCity: get_prices() with multi-city + BM support"
    - "ao-bin-dumps static files → RecipeParser/RRREngine at startup"

