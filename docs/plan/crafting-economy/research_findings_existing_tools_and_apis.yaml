competitive_analysis:
  our_strengths:
    - "CLI tool - fast, scriptable, no browser needed"
    - "Custom ranking formula (weighted profit + liquidity)"
    - "Python stdlib only - zero dependencies"
    - "API batch optimization already implemented"
  gaps_vs_competitors:
    - "No crafting simulation (vs Albion Free Market)"
    - "No dynamic RRR/city bonus calculation (vs Tools4Albion)"
    - "No cross-city comparison (vs Albionix)"
    - "No Focus cost integration (vs any tool that calculates profit/focus)"
    - "Only cloth armor recipes (vs tools covering all categories)"
    - "No Black Market pricing"
    - "No gold price tracking"

