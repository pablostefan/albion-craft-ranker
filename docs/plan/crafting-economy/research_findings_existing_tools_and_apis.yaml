# ===== TOOLS & APIs DEEP FINDINGS =====

apis_and_data_sources:
  aodp_api:
    name: "Albion Online Data Project (AODP)"
    website: "https://www.albion-online-data.com"
    description: |
      Community-driven project that collects and serves Albion Online market data.
      Data is sourced from players who install the Albion Online Data Client, which
      captures market data as players browse the in-game auction houses.
    servers:
      americas: "https://west.albion-online-data.com"
      europe: "https://europe.albion-online-data.com"
      asia: "https://east.albion-online-data.com"
    rate_limits:
      per_minute: 180
      per_5_minutes: 300
      url_char_limit: 4096
    endpoints:
      prices:
        url: "/api/v2/stats/prices/{item_ids}.json"
        params:
          locations: "Comma-separated city names (e.g., Martlock,Bridgewatch)"
          qualities: "1-5 (Normal, Good, Outstanding, Excellent, Masterpiece)"
        returns: "sell_price_min, sell_price_min_date, buy_price_max, buy_price_max_date per item/city/quality"
        format: "JSON array (default) or XML with .xml extension"
      table_view:
        url: "/api/v2/stats/view/{item_ids}"
        params: "Same as prices"
        returns: "Tabular HTML view of price data"
      history:
        url: "/api/v2/stats/history/{item_ids}.json"
        params:
          date: "Start date (YYYY-MM-DD)"
          end_date: "End date (YYYY-MM-DD)"
          locations: "City name"
          qualities: "Quality level"
          time_scale: "1 (hourly), 6 (6-hour), 24 (daily)"
        returns: "Historical sell orders only: item_count, price_min, price_max, price_avg per time bucket"
        note: "Sell history only. Does not include buy order history."
      charts:
        url: "/api/v2/stats/charts/{item_ids}.json"
        params: "Same as history"
        returns: "Same data as history but in chart-friendly format"
      gold:
        url: "/api/v2/stats/gold.json"
        params:
          date: "Start date (optional)"
          end_date: "End date (optional)"
          count: "Number of latest records (alternative to date range)"
        returns: "Gold price history (silver-to-gold exchange rate)"
    swagger: "Available at server URL root"
    data_client:
      name: "Albion Online Data Client"
      description: "Desktop application that captures market data from Albion Online game client"
      platforms: ["Windows (.exe)", "Linux (CLI binary)"]
    source: "https://www.albion-online-data.com/api"

  aodp_server:
    name: "albiondata-server-rails"
    repo: "https://github.com/ao-data/albiondata-server-rails"
    description: "The backend Rails server that powers the AODP API"
    tech_stack: "Ruby on Rails"
    version: "0.2.38"
    details: |
      Uses Redis for caching, with separate databases for each server region.
      Redis DB mapping: 0=US West, 1=US East, 2=Europe, 3=Asia.
      Cache databases: 5=US West cache, 6=US East cache, 7=Europe cache, 8=Asia cache.
    contributors: 5
    source: "https://github.com/ao-data/albiondata-server-rails"

  game_data_dumps:
    name: "ao-bin-dumps"
    repo: "https://github.com/ao-data/ao-bin-dumps"
    stars: 127
    description: |
      Regularly updated dump of Albion Online game data files extracted from the game client.
      Contains all item definitions, crafting recipes, building data, loot tables, and more.
      This is THE authoritative source for item IDs, crafting requirements, and game mechanics data.
    key_files:
      items_json:
        path: "items.json"
        purpose: "Complete item definitions - IDs, tiers, enchantments, crafting requirements, resource costs"
        updated: "20260311"
        usage: "Auto-generate recipes.csv with correct material quantities and focus costs"
      items_xml:
        path: "items.xml"
        purpose: "XML version of item definitions (same data, different format)"
      crafting_modifiers:
        path: "craftingmodifiers.json"
        purpose: "City-specific crafting bonuses and production modifier values"
        updated: "20240108"
        usage: "Calculate dynamic RRR per city instead of fixed parameter"
      buildings:
        path: "buildings.json"
        purpose: "Building types and their crafting capabilities"
        updated: "20260401"
      loot:
        path: "loot.json"
        purpose: "Loot tables linking mob types to item drops. Useful for predicting Black Market demand."
        updated: "20260223"
      formatted_items:
        txt_path: "formatted/items.txt"
        json_path: "formatted/items.json"
        purpose: "Pre-formatted item IDs ready for use with AODP API"
      formatted_world:
        txt_path: "formatted/world.txt"
        json_path: "formatted/world.json"
        purpose: "Location/city identifiers for AODP API"
    source: "https://github.com/ao-data/ao-bin-dumps"

