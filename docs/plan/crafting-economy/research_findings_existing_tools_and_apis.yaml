plan_id: crafting-economy
objective: "Research existing tools, APIs, and data sources for Albion Online crafting/trading"
focus_area: existing_tools_and_apis
created_at: "2025-07-13T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - Primary API: Albion Online Data Project (AODP) with 3 regional servers (west/east/europe). Rate limits: 180 req/min, 300 req/5min, 4096 char URL.
  - Key endpoints: /api/v2/stats/prices (current), /api/v2/stats/history (volume), /api/v2/stats/gold (gold prices). Data sourced from player-installed client.
  - Game data dumps: ao-data/ao-bin-dumps GitHub repo has items.json, craftingmodifiers.json, buildings.json, loot.json for offline data.
  - 9+ third-party tools exist, notably Albion Free Market (crafting simulation), Tools4Albion (calculators), AlbionOnline2d (market metrics).
  - Current codebase already uses AODP correctly but only leverages prices and history endpoints, not gold prices.

research_metadata:
  methodology: "fetch_webpage for AODP main page, API docs, ao-bin-dumps repo, albiondata-server-rails repo, 3rd Party Tools wiki page"
  scope: "Complete survey of available APIs, data sources, game data files, and competing/complementary tools"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

files_analyzed:
  - file: albion_client.py
    path: src/albion_client.py
    purpose: "Existing API client implementation"
    key_elements:
      - element: BASE_URLS
        type: variable
        location: "src/albion_client.py:14"
        description: "Correctly maps west/east/europe to their AODP server URLs"
      - element: get_prices
        type: function
        location: "src/albion_client.py:61"
        description: "Batches up to 120 items per request. Uses /api/v2/stats/prices/{items}.json"
      - element: get_history_bulk
        type: function
        location: "src/albion_client.py:93"
        description: "Batches up to 40 items. Uses /api/v2/stats/history/{items}.json with time-scale=24"
    language: python
    lines: 120

patterns_found:
  - category: architecture
    pattern: "Correct API usage with conservative batching"
    description: |
      The existing client correctly implements batching (120 for prices, 40 for history) and
      exponential backoff for rate limiting. The batch sizes are reasonable given the 4096 char URL limit.
    examples:
      - file: albion_client.py
        location: "src/albion_client.py:61-90"
        snippet: "item_ids_str = ','.join(sorted(set(item_ids)))"
    prevalence: common

  - category: architecture
    pattern: "Missing API endpoints"
    description: |
      The client only uses prices and history endpoints. Gold prices endpoint
      (/api/v2/stats/gold.json) is not implemented. Charts endpoint not used either.
    prevalence: common

