plan_id: crafting-economy
variant: a
approach: |
  Balanced waves with data-layer-first strategy. Wave 1 builds foundation (project setup, data parsing, models).
  Wave 2 builds core engines (RRR, scoring, API client upgrade). Wave 3 delivers the API layer.
  Wave 4 builds the frontend. Wave 5 is integration testing + documentation.
  Maximum parallelism within each wave — tasks sharing no file targets run concurrently.
objective: "Evolve the Albion Craft Ranker from a CLI tool covering 90 cloth armor items to a full-stack web application (FastAPI + Next.js) covering 3,982+ craftable items with dynamic RRR, focus optimization, cross-city optimization, optional Black Market, and return rate percentage visibility."
created_at: "2026-04-12T00:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high

plan_metrics:
  total_tasks: 22
  total_waves: 5
  wave_1_task_count: 5
  total_dependencies: 28
  risk_score: medium
  estimated_complexity: complex

tldr: |
  22 tasks across 5 waves. Wave 1 (5 tasks) sets up project scaffolding, domain models, items.json parser,
  craftingmodifiers parser, and Next.js frontend skeleton — all in parallel. Wave 2 (5 tasks) builds the
  dynamic RRR engine, scoring engine v2, API client v2, recipe generator pipeline, and frontend layout shell.
  Wave 3 (4 tasks) delivers FastAPI endpoints, cross-city optimizer, Black Market integration, and background
  price refresh. Wave 4 (4 tasks) builds the frontend ranking table, filters, item detail, and config panel.
  Wave 5 (4 tasks) does E2E integration testing, API testing, frontend design review, and project documentation.

open_questions:
  - "ao-bin-dumps/items.json download strategy: bundle at build time or fetch at startup?"
  - "Cache invalidation strategy: per-city TTL or global TTL?"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "items.json parser fails on polymorphic craftingrequirements (dict vs list)"
      likelihood: medium
      impact: high
      mitigation: "Research already documented all polymorphism patterns. Parser must normalize both dict→list. Include comprehensive unit tests covering all 18 item categories."

    - scenario: "AODP API rate limits exceeded during cross-city price fetching (7+ cities × 3982 items)"
      likelihood: high
      impact: medium
      mitigation: "Implement aggressive batching (120 items/req), cache with TTL, stagger city requests. Background refresh prevents user-blocking. Fallback to stale data with freshness warning."

    - scenario: "Frontend-backend API contract mismatch causes integration failures"
      likelihood: medium
      impact: medium
      mitigation: "Define Pydantic response models in Wave 2 (shared types). Frontend uses TypeScript interfaces generated from OpenAPI spec."

    - scenario: "Scoring engine v2 performance degrades with 3,982+ items × 9 cities"
      likelihood: low
      impact: medium
      mitigation: "In-memory computation with numpy-style vectorization. Cache ranked results. Paginate API responses."

    - scenario: "craftingmodifiers.json format changes between game patches"
      likelihood: low
      impact: high
      mitigation: "Pin ao-bin-dumps to a known commit hash. Add schema validation on parse. Alert on unexpected structure."

  assumptions:
    - "ao-bin-dumps items.json and craftingmodifiers.json will be downloaded and bundled as static data files"
    - "Server West (Americas) is default; server selection is a config parameter"
    - "Premium tax rate (4%) is default; Normal (8%) is togglable"
    - "The existing albion_client.py retry/backoff logic is sound and will be extended, not rewritten"
    - "Next.js app runs as separate process; communicates with FastAPI via REST"
    - "No authentication required for MVP — public dashboard"

implementation_specification:
  code_structure: |
    Backend reorganized into modular packages:
      src/
        models/          — Pydantic domain models (Recipe, Material, RankedItem, CityBonus, etc.)
        parsers/         — items.json parser, craftingmodifiers parser
        engines/         — RRR engine, scoring engine v2, cross-city optimizer
        api/             — FastAPI app, routes, dependencies
        services/        — price cache, background refresh, recipe generation pipeline
        albion_client.py — upgraded API client (Black Market support)
        config.py        — centralized configuration
      frontend/
        src/app/         — Next.js app router pages
        src/components/  — React components (RankingTable, Filters, ItemDetail, etc.)
        src/lib/         — API client, types, utils
      data/
        items.json       — downloaded ao-bin-dumps data
        craftingmodifiers.json
      tests/
        test_parsers/
        test_engines/
        test_api/

  affected_areas:
    - "src/ — entire backend restructured from flat scripts to modular packages"
    - "frontend/ — new Next.js application"
    - "data/ — new static game data files"
    - "tests/ — new test suite"
    - "requirements.txt — add FastAPI, uvicorn, pydantic, httpx"
    - "package.json — new frontend dependencies"

  component_details:
    - component: "Recipe Parser (src/parsers/items_parser.py)"
      responsibility: "Parse ao-bin-dumps/items.json, normalize polymorphic structures, extract all 3,982+ craftable recipes with materials, focus costs, artifact flags"
      interfaces:
        - "parse_items(items_json_path: Path) -> list[Recipe]"
        - "Recipe dataclass with 1:N materials relationship"

    - component: "Crafting Modifiers Parser (src/parsers/modifiers_parser.py)"
      responsibility: "Parse craftingmodifiers.json, extract city bonuses per crafting category"
      interfaces:
        - "parse_modifiers(modifiers_json_path: Path) -> dict[str, dict[str, CityBonus]]"
        - "get_city_bonus(city: str, crafting_category: str) -> float"

    - component: "Dynamic RRR Engine (src/engines/rrr_engine.py)"
      responsibility: "Calculate RRR per item based on city, category, focus, specialization"
      interfaces:
        - "calculate_rrr(city: str, category: str, use_focus: bool) -> float"
        - "calculate_effective_cost(materials: list[Material], rrr: float) -> float"

    - component: "Scoring Engine v2 (src/engines/scoring_engine.py)"
      responsibility: "Calculate all metrics: profit_absolute, return_rate_pct, profit_per_focus, liquidity_score, freshness_score. Configurable weights."
      interfaces:
        - "score_items(recipes: list[Recipe], prices: PriceIndex, config: ScoringConfig) -> list[RankedItem]"
        - "RankedItem with return_rate_pct as primary visible metric"

    - component: "Cross-City Optimizer (src/engines/city_optimizer.py)"
      responsibility: "For each item, calculate profit across all 9 locations, recommend best city"
      interfaces:
        - "optimize_cities(recipe: Recipe, prices: PriceIndex, modifiers: CityModifiers) -> list[CityResult]"

    - component: "FastAPI Application (src/api/app.py)"
      responsibility: "REST API with endpoints for ranking, item detail, city bonuses, config"
      interfaces:
        - "GET /api/items — ranked items with filters"
        - "GET /api/items/{item_id} — item detail with cost breakdown"
        - "GET /api/cities — city bonuses"
        - "GET /api/config — scoring config"

    - component: "Next.js Dashboard (frontend/)"
      responsibility: "Web UI with ranking table, filters, Black Market toggle, item detail"
      interfaces:
        - "Pages: / (ranking), /items/[id] (detail)"
        - "Components: RankingTable, FilterBar, BlackMarketToggle, WeightConfig, ItemDetail"

  dependencies:
    - component: "Scoring Engine v2"
      relationship: "Depends on RRR Engine for effective cost calculation"
    - component: "Scoring Engine v2"
      relationship: "Depends on Recipe Parser for recipe data"
    - component: "FastAPI Application"
      relationship: "Depends on Scoring Engine v2 for ranking computation"
    - component: "FastAPI Application"
      relationship: "Depends on AlbionAPIClient v2 for price data"
    - component: "Next.js Dashboard"
      relationship: "Calls FastAPI REST endpoints for all data"
    - component: "Cross-City Optimizer"
      relationship: "Depends on RRR Engine and Crafting Modifiers Parser"

  integration_points:
    - "FastAPI ↔ Next.js: REST API with JSON responses, OpenAPI spec"
    - "Recipe Parser ↔ Scoring Engine: Recipe/Material dataclasses"
    - "AlbionAPIClient ↔ Scoring Engine: PriceIndex dict"
    - "Crafting Modifiers ↔ RRR Engine: CityBonus mapping"
    - "Background refresh task ↔ In-memory cache: price data lifecycle"

