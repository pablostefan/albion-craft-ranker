          - Multi-material item (list craftresource)
          - Alternative recipes (list craftingrequirements — use first)
          - Enchanted item with enchantment hierarchy
          - Artifact material detection (maxreturnamount=0)
          - Skip swaptransaction items
          - Consumable with amountcrafted > 1
        file_targets:
