          2. CORS: only allow configured origins (not *)
          3. Rate limiting: API doesn't proxy unlimited requests to AODP
          4. Error handling: no stack traces leaked in error responses
          5. Dependency audit: check for known vulnerabilities in Python and Node dependencies
          6. No secrets in code (API keys, tokens, etc.)
          7. XSS: frontend doesn't render unsanitized user input
          8. SSRF: backend doesn't allow arbitrary URL fetches
          9. Code quality: consistent patterns, no dead code, no TODOs in production paths
