  - wave: 2
    name: "Core Engines — RRR, Scoring, API Client, Pipeline"
    objective: "Build the dynamic RRR engine, scoring engine v2 with return_rate_pct, upgrade API client for Black Market, assemble recipe generation pipeline, build frontend layout"
    contracts_in:
      - "Domain models from task_001"
      - "Recipe parser from task_003"
      - "Modifiers parser from task_004"
    contracts_out:
      - "Dynamic RRR calculation per city/category/focus"
      - "Scoring engine with all v2 metrics"
      - "API client supporting Black Market prices"
      - "Full recipe pipeline from items.json to scored rankings"
      - "Frontend layout with component shells"
    tasks:
      - task_id: "task_006"
        name: "Dynamic RRR engine"
        agent: "gem-implementer"
        description: |
          Build the dynamic Resource Return Rate engine in src/engines/rrr_engine.py.

          Implementation:
          1. Formula: RRR = 1 - 1/(1 + ProductionBonus/100) where ProductionBonus comes from
             city modifier + focus bonus + specialization.
          2. get_production_bonus(city, category, use_focus, spec_bonus=0):
             - base = 0 (no inherent production bonus without city/focus)
             - city_bonus = modifiers_parser.get_production_bonus(city, category) × 100
             - focus_bonus = 59.0 if use_focus else 0
             - total = city_bonus + focus_bonus + spec_bonus
             - return total
          3. calculate_rrr(production_bonus: float) → float:
             - return 1.0 - 1.0 / (1.0 + production_bonus / 100.0)
          4. calculate_effective_material_cost(materials: list[Material], prices: dict, rrr: float) → float:
             - For each material: if material.is_artifact → cost = price × count (no RRR)
             - Else → cost = price × count × (1 - rrr)
             - Return sum of all material costs
          5. Precomputed RRR table for known city/category combos for performance.

          Unit tests in tests/test_engines/test_rrr_engine.py:
          - No bonus → RRR = 0% (production_bonus=0)
          - City bonus 15% → RRR ≈ 13.04%
          - City craft bonus only → RRR ≈ 24.8% (production_bonus=36.7... verify exact from research)
          - City + focus → verify against known values
          - Artifact material excluded from RRR reduction
        file_targets:
          - "src/engines/__init__.py"
          - "src/engines/rrr_engine.py"
          - "tests/test_engines/__init__.py"
          - "tests/test_engines/test_rrr_engine.py"
        dependencies: ["task_001", "task_004"]
        conflicts_with: []
        acceptance_criteria:
          - "RRR of T4_CLOTH in Lymhurst (specialty) matches ~24.8% with city bonus"
          - "RRR in non-specialty city matches ~13.04% base"
          - "Artifact materials are not reduced by RRR"
          - "Focus adds 59% to production bonus"
          - "All unit tests pass"
        estimated_effort: medium
        estimated_files: 4
        estimated_lines: 180
        priority: high
        status: pending
        flags: {}
        planning_pass: 1
        planning_history:
          - pass: 1
            reason: "Core engine — scoring depends on this"
            timestamp: "2026-04-12T00:00:00Z"
        tech_stack: ["python"]
