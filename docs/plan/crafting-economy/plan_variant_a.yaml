      - task_id: "task_003"
        name: "items.json parser — recipe extraction"
        agent: "gem-implementer"
        description: |
          Build the core parser for ao-bin-dumps/items.json that extracts all craftable recipes.
          Create src/parsers/__init__.py and src/parsers/items_parser.py.

          Parser requirements:
          1. Download items.json from raw.githubusercontent.com/ao-data/ao-bin-dumps/master/items.json (or load from local data/items.json).
          2. Iterate ALL item categories: equipmentitem, weapon, simpleitem, consumableitem, mount, furnitureitem, trackingitem, farmableitem, transformationweapon, crystalleagueitem, siegebanner, hideoutitem, consumablefrominventoryitem.
          3. For each item with craftingrequirements:
             - Normalize craftingrequirements: if dict → [dict]. Use FIRST recipe from list (standard recipe).
             - Skip if @swaptransaction='true' (journals, silver purchases).
             - Extract @craftingfocus as focus_cost.
             - Extract @amountcrafted (default 1).
             - Normalize craftresource: if dict → [dict].
             - For each craftresource: extract @uniquename, @count, @maxreturnamount (0 → artifact), @enchantmentlevel.
          4. Handle enchantments: iterate .enchantments.enchantment[] — each produces a separate Recipe with enchanted material IDs (e.g., T4_CLOTH_LEVEL1@1).
          5. Extract @craftingcategory from item-level fields for RRR mapping.
          6. Return list[Recipe] using models from task_001.

          Include a download_game_data() utility that fetches items.json and craftingmodifiers.json to data/.

          Write comprehensive unit tests in tests/test_parsers/test_items_parser.py covering:
