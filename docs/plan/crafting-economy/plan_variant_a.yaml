          Metrics per item:
          1. profit_absolute = net_revenue - effective_craft_cost
          2. return_rate_pct = (profit_absolute / effective_craft_cost) × 100  ← PRIMARY user metric
          3. profit_per_focus = (profit_with_focus - profit_without_focus) / focus_cost
          4. liquidity_score = median daily volume from history endpoint
          5. freshness_score = hours since last price update (lower = fresher = better)
          6. final_score = weighted sum of normalized metrics

          Tax calculation:
          - setup_fee = sell_price × 0.025 (non-refundable)
          - sales_tax = sell_price × (0.04 if premium else 0.08)
          - net_revenue = sell_price - setup_fee - sales_tax

          Cost calculation:
          - Uses RRR engine (task_006) for effective material cost
          - Artifacts at full cost, regular materials reduced by RRR

          Function: score_items(recipes, price_index, modifiers, config) → list[RankedItem]
          - For each recipe: compute all metrics, apply weights, sort by final_score
          - Skip items with missing prices or negative profit (unless config allows)

